<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="styles.css"><style>
html,body{margin:0}
.tile{width:1280px;height:854px;display:flex;overflow:hidden}

</style></head><body>
<div class="tile">
  <div class="main"><span class="wm">benimolabilirdi</span><svg class="face" width="92" height="92" viewBox="0 0 44 44" fill="none"><circle cx="15.5" cy="18" r="2.8" fill="currentColor"/><circle cx="28.5" cy="18" r="2.8" fill="currentColor"/><path d="M13 31 Q22 24 31 31" stroke="currentColor" stroke-width="3.4" stroke-linecap="round"/></svg></div>
  <div class="strip">
    <i style="background:var(--gold-300)"></i>
    <i style="background:var(--green-400)"></i>
    <i style="background:var(--green-700)"></i>
    <i style="background:var(--navy-800)"></i>
  </div>
</div>
</body></html>
