<!-- @dsCard group="Components" viewport="700x360" name="Flow — tiles, steps, sparkle" subtitle="CategoryTile · StepIndicator · WishItem · SparkleBurst" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;font-family:var(--font-ui);background:var(--bg-page);padding:22px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.row{display:flex;align-items:center;gap:16px;margin-bottom:16px}</style></head>
<body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { CategoryTile, StepIndicator, WishItem, SparkleBurst } = window.BenimolabilirdiDesignSystem_717d58;
function Demo(){
  const [sel,setSel]=React.useState("simit");const [qty,setQty]=React.useState(2);const [t,setT]=React.useState(0);
  return (<div>
    <div class="grid">
      <CategoryTile emoji="🥖" label="Simit" selected={sel==="simit"} onClick={()=>setSel("simit")}/>
      <CategoryTile emoji="⛽" label="Benzin" selected={sel==="benzin"} onClick={()=>setSel("benzin")}/>
      <CategoryTile emoji="☕" label="Kahve" selected={sel==="kahve"} onClick={()=>setSel("kahve")}/>
      <CategoryTile emoji="🎬" label="Sinema" selected={sel==="sinema"} onClick={()=>setSel("sinema")}/>
    </div>
    <div class="row"><StepIndicator steps={4} current={1}/><span style={{fontSize:13,color:"var(--text-muted)"}}>2 / 4 adım</span></div>
    <SparkleBurst trigger={t}>
      <WishItem emoji="🥖" name="Simit" price={15} qty={qty} onAdd={()=>{setQty(qty+1);setT(t+1)}} onRemove={()=>setQty(Math.max(1,qty-1))}/>
    </SparkleBurst>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script></body></html>
