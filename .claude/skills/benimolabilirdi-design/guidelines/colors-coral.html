<!-- @dsCard group="Colors" viewport="700x170" name="Coral scale" subtitle="Warm accent — the tax / shock side. Never a flag-red." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;font-family:var(--font-num);background:var(--bg-page);padding:20px;display:flex;gap:0;border-radius:12px}
.sw{flex:1;height:110px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-size:10px}
.sw:first-child{border-radius:var(--r-md) 0 0 var(--r-md)}.sw:last-child{border-radius:0 var(--r-md) var(--r-md) 0}
</style></head><body>
<div class="sw" style="background:var(--coral-100);color:var(--coral-700)">100</div>
<div class="sw" style="background:var(--coral-300);color:var(--coral-700)">300</div>
<div class="sw" style="background:var(--coral-400);color:#fff">400</div>
<div class="sw" style="background:var(--coral-500);color:#fff"><b>500</b><br>accent</div>
<div class="sw" style="background:var(--coral-600);color:#fff">600</div>
<div class="sw" style="background:var(--coral-700);color:#fff">700</div>
</body></html>
