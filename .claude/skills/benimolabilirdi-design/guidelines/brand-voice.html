<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;font-family:var(--font-ui);background:var(--bg-page);padding:20px;color:var(--text-body)}
.row{display:flex;gap:14px}
.col{flex:1;background:#fff;border-radius:var(--r-md);padding:14px;box-shadow:var(--shadow-sm)}
.col.no{background:var(--coral-100)}
.tag{font-size:11px;font-weight:700;letter-spacing:var(--ls-caps);text-transform:uppercase}
.yes .tag{color:var(--green-600)}.no .tag{color:var(--coral-600)}
.col p{font-family:var(--font-display);font-weight:700;font-size:16px;margin:8px 0 0;line-height:1.35}
.col small{display:block;color:var(--text-muted);font-size:12px;margin-top:8px}
</style></head><body>
<div class="row">
<div class="col yes"><span class="tag">✓ böyle</span><p>"Cebinde 340 TL kaldı — simit parası 🥨"</p><small>sen dili · sıcak · buruk gülümseme</small></div>
<div class="col no"><span class="tag">✕ böyle değil</span><p>"Kullanıcının ödediği vergi tutarı 340 TL'dir."</p><small>kurumsal · mesafeli · soğuk</small></div>
</div>
</body></html>
